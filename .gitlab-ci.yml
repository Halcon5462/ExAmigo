image: python:3.12-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

stages:
  - style
  - test
  - build
  # - documentation

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/
    - frontend/node_modules/

.backend_setup:
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements.txt --prefer-binary
    - python manage.py makemigrations
    - python manage.py migrate

pylint:
  stage: style
  extends: .backend_setup
  script:
    - pylint --fail-under=6 --ignore-paths="docs/*" .

pycodestyle:
  stage: style
  extends: .backend_setup
  script:
    - pycodestyle --max-line-length=120 . || true

coverage:
  stage: test
  extends: .backend_setup
  script:
    - pip install coverage
    - coverage run manage.py test
    - coverage report -m

frontend-build:
  stage: build
  image: node:20-alpine
  cache:
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build

