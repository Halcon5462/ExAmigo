image: python:3.12-slim

variables:
  GIT_STRATEGY: clone

stages:
  - style
  - test
  - coverage
  - build
  - documentation

# =====================
# CACHE
# =====================
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - backend/.cache/pip
    - backend/.venv/
    - frontend/node_modules/

# =====================
# BACKEND SETUP
# =====================
.backend_setup:
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - python manage.py makemigrations
    - python manage.py migrate

# =====================
# STYLE
# =====================
pylint:
  stage: style
  extends: .backend_setup
  script:
    - pylint --fail-under=6 --ignore-paths="docs/*" .
    - echo "Pylint complete."

pycodestyle:
  stage: style
  extends: .backend_setup
  script:
    - pycodestyle --max-line-length=120 . || true

# =====================
# TESTS
# =====================
unittest:
  stage: test
  extends: .backend_setup
  script:
    - python manage.py test || true

# =====================
# COVERAGE
# =====================
coverage:
  stage: coverage
  extends: .backend_setup
  script:
    - pip install coverage
    - coverage run manage.py test || true 
    - coverage report -m
    - coverage html
  artifacts:
    paths:
      - backend/htmlcov/

# =====================
# FRONTEND BUILD
# =====================
frontend-build:
  stage: build
  image: node:20-alpine
  cache:
    key: frontend-cache
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/build/

# =====================
# DOCS
# =====================
sphinx:
  stage: documentation
  before_script:
    - apk add --no-cache make
  script:
    - cd docs
    - make html
  artifacts:
    paths:
      - docs/build/