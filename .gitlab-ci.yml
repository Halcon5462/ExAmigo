image: python:3.13.3-alpine3.20

stages:
  - style
  - test
  - coverage
  - build
  - documentation

# ---------------------
# BACKEND SETUP
# ---------------------
.backend_setup:
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt

# ---------------------
# STYLE (BACKEND)
# ---------------------
pylint:
  stage: style
  extends: .backend_setup
  script:
    - pylint --fail-under=6 --ignore-paths="docs/*" .
    - echo "Pylint complete."
  artifacts:
    when: on_success
    expire_in: 30 days

pycodestyle:
  stage: style
  extends: .backend_setup
  script:
    - pycodestyle --max-line-length=120 .
    - echo "Pycodestyle complete."
  artifacts:
    when: on_failure
    expire_in: 30 days

# ---------------------
# TESTS (DJANGO)
# ---------------------
unittest:
  stage: test
  extends: .backend_setup
  script:
    - python manage.py test
  artifacts:
    when: on_failure
    expire_in: 30 days

# ---------------------
# COVERAGE
# ---------------------
coverage:
  stage: coverage
  extends: .backend_setup
  script:
    - coverage run manage.py test
    - coverage report -m
    - coverage html
  artifacts:
    paths:
      - backend/htmlcov/
    expire_in: 30 days
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'

# ---------------------
# FRONTEND BUILD
# ---------------------
frontend-build:
  stage: build
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run dev
  artifacts:
    paths:
      - frontend/build/
    expire_in: 30 days

# ---------------------
# DOCUMENTATION (SPHINX)
# ---------------------
sphinx:
  stage: documentation
  before_script:
    - apk add --no-cache make
  script:
    - cd docs
    - make html
  artifacts:
    paths:
      - docs/build/
    expire_in: 30 days